name: Crawler

on:
  schedule:
    # UTC 기준으로 매시 정각에 실행 (KST는 UTC+9)
    - cron: '12 * * * *'
  workflow_dispatch: # GitHub 페이지에서 수동으로 실행할 수 있는 버튼 추가

jobs:
  crawl-and-save:
    runs-on: ubuntu-latest
    
    # GitHub Actions 봇이 레포지토리에 커밋할 수 있도록 권한 부여
    permissions:
      contents: write

    steps:
      - name: 1. 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 2. Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytz
          playwright install chromium

      - name: 4. 크롤러 실행
        env:
          # GitHub Secrets에서 가져올 환경 변수
          HANYANG_ID: ${{ secrets.HANYANG_ID }}
          HANYANG_PW: ${{ secrets.HANYANG_PW }}
        run: python crawler.py

      - name: 5. 크롤링 결과(CSV) 커밋 및 푸시
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # csv, png, html 파일을 모두 추가
          git add seat_data.csv debug_screen.png debug_page.html || true
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "데이터 업데이트 및 디버그 기록" && git push)
